  <body>

    <script>
      (function () {
        const query = window.location.search.substring(1);
        const target = query.split('&')[0].replace(/~and~/g, '&');

        if (target) {
          window.history.replaceState(
            null,
            null,
            window.location.pathname.slice(0, -1) +
              (target ? '/' + target : '') +
              window.location.search
                .replace('?' + query, '')
                .replace(/\?&/, '?') +
              window.location.hash
          );
        }
      })();
